<script>
// Theme toggle
(function() {
    var toggle = document.querySelector('.theme-toggle');
    if (!toggle) return;
    toggle.addEventListener('click', function() {
        var current = document.documentElement.getAttribute('data-theme');
        if (!current) {
            current = (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light';
        }
        var next = current === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
    });
})();

// Reading progress bar (only on post pages)
(function() {
    var bar = document.getElementById('progressBar');
    if (!bar || !document.querySelector('.post-content')) return;
    window.addEventListener('scroll', function() {
        var scrollTop = window.scrollY;
        var docHeight = document.documentElement.scrollHeight - window.innerHeight;
        if (docHeight > 0) {
            bar.style.width = (scrollTop / docHeight * 100) + '%';
        }
    });
})();

// Footnote enhancement: build sidenotes on wide viewports, and on every
// viewport make the marker click do its own smooth scroll. The default
// browser anchor jump is unreliable on image-heavy posts because images
// continue to load after the scroll begins, shifting the target.
(function() {
    var init = function() {
        var postContent = document.querySelector('.post-content');
        var footnotesSection = document.querySelector('.footnotes');
        if (!postContent || !footnotesSection) return;

        var refs = postContent.querySelectorAll('sup[id^="fnref"] a');
        if (!refs.length) return;

        var footnotesOl = footnotesSection.querySelector('ol');
        if (!footnotesOl) return;

        // Build entry list: one per footnote marker, including a reference
        // to the bottom-of-post <li> for fallback navigation on narrow widths.
        var entries = [];
        refs.forEach(function(ref) {
            var href = ref.getAttribute('href');
            if (!href) return;
            var li = document.getElementById(href.replace('#', ''));
            if (!li) return;
            var sup = ref.closest('sup');
            if (!sup) return;
            entries.push({ ref: ref, sup: sup, li: li, aside: null });
        });
        if (!entries.length) return;

        // Wide viewports get sidenotes laid out in the right margin.
        if (window.innerWidth >= 1100) {
            entries.forEach(function(entry) {
                var aside = document.createElement('aside');
                aside.className = 'sidenote';

                var numSpan = document.createElement('span');
                numSpan.className = 'sidenote__number';
                numSpan.textContent = entry.ref.textContent + '.';
                aside.appendChild(numSpan);

                var clone = entry.li.cloneNode(true);
                clone.removeAttribute('id');
                clone.querySelectorAll('.reversefootnote').forEach(function(rl) { rl.remove(); });

                var ps = clone.querySelectorAll('p');
                if (ps.length) {
                    ps.forEach(function(p) {
                        aside.appendChild(document.createTextNode(' '));
                        while (p.firstChild) aside.appendChild(p.firstChild);
                    });
                } else {
                    aside.appendChild(document.createTextNode(' '));
                    while (clone.firstChild) aside.appendChild(clone.firstChild);
                }

                postContent.appendChild(aside);
                entry.aside = aside;
            });
            postContent.classList.add('has-sidenotes');

            // Position each sidenote next to its reference paragraph, pushing
            // later notes down to avoid overlap. Done after window.load so
            // paragraph offsets account for fully-loaded images.
            var position = function() {
                var lastBottom = 0;
                entries.forEach(function(entry) {
                    if (!entry.aside) return;
                    var paragraph = entry.sup.closest('p') || entry.sup.parentElement;
                    var top = paragraph.offsetTop;
                    if (top < lastBottom + 8) top = lastBottom + 8;
                    entry.aside.style.top = top + 'px';
                    lastBottom = top + entry.aside.offsetHeight;
                });
            };
            position();

            var resizeTimer;
            window.addEventListener('resize', function() {
                clearTimeout(resizeTimer);
                resizeTimer = setTimeout(position, 150);
            });

            // Lazy-loaded images below the fold continue landing after
            // window.load, each one pushing later paragraphs down and
            // leaving previously-positioned sidenotes anchored to stale
            // offsets. Re-run position() whenever the post-content box
            // resizes. Debounced so the callback fires once per burst.
            if (window.ResizeObserver) {
                var roTimer;
                var ro = new ResizeObserver(function() {
                    clearTimeout(roTimer);
                    roTimer = setTimeout(position, 100);
                });
                ro.observe(postContent);
            }
        }

        // Marker click: smooth-scroll to whichever target is currently
        // visible. On wide viewports that's the sidenote; on narrow ones
        // (or after a resize down) it's the bottom-of-post footnote li.
        // Lazy-loaded images further down the page can load mid-scroll and
        // push the target down, so we re-scroll on a short interval until
        // the target is actually in view (or until we give up).
        var scrollToTarget = function(target) {
            target.scrollIntoView({ behavior: 'smooth', block: 'center' });
            var attempts = 0;
            var settle = setInterval(function() {
                attempts++;
                var rect = target.getBoundingClientRect();
                var inView = rect.top >= 0 && rect.bottom <= window.innerHeight;
                if (inView || attempts >= 8) {
                    clearInterval(settle);
                    return;
                }
                target.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 400);
        };

        entries.forEach(function(entry) {
            entry.ref.addEventListener('click', function(e) {
                var target = (entry.aside && entry.aside.offsetParent !== null)
                    ? entry.aside
                    : entry.li;
                e.preventDefault();
                target.classList.remove('sidenote--flash');
                // Force reflow so the animation restarts on repeat clicks.
                void target.offsetWidth;
                target.classList.add('sidenote--flash');
                scrollToTarget(target);
            });
        });
    };

    // Defer until images have loaded; otherwise paragraph.offsetTop is
    // measured against a too-short page and sidenotes land in the wrong place.
    if (document.readyState === 'complete') {
        init();
    } else {
        window.addEventListener('load', init);
    }
})();

// Blockquote attribution detection
(function() {
    var quotes = document.querySelectorAll('blockquote');
    quotes.forEach(function(bq) {
        var lastP = bq.querySelector('p:last-child');
        if (!lastP) return;
        var text = lastP.textContent.trim();
        if (text.charAt(0) === '\u2014' || text.substring(0, 2) === '--') {
            lastP.classList.add('blockquote-attribution');
        }
    });
})();

// Scroll-linked header shrink
(function() {
    var header = document.querySelector('.site-header');
    if (!header) return;
    var compact = false;
    var ticking = false;

    window.addEventListener('scroll', function() {
        if (!ticking) {
            requestAnimationFrame(function() {
                if (window.scrollY > 100 && !compact) {
                    header.classList.add('header--compact');
                    compact = true;
                } else if (window.scrollY <= 100 && compact) {
                    header.classList.remove('header--compact');
                    compact = false;
                }
                ticking = false;
            });
            ticking = true;
        }
    });
})();

// About page "Ink Cursor" mouse animation
(function() {
    var area = document.getElementById('about-ink-area');
    if (!area) return;

    // Desktop only
    if (!window.matchMedia('(hover: hover)').matches) return;

    // Respect reduced motion
    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

    var lastTime = 0;
    area.addEventListener('mousemove', function(e) {
        var now = Date.now();
        if (now - lastTime < 30) return;
        lastTime = now;

        var dot = document.createElement('div');
        dot.className = 'ink-dot';
        var size = 2 + Math.random() * 3;
        dot.style.width = size + 'px';
        dot.style.height = size + 'px';
        dot.style.left = e.clientX - size / 2 + 'px';
        dot.style.top = e.clientY - size / 2 + 'px';
        document.body.appendChild(dot);

        dot.addEventListener('animationend', function() {
            dot.remove();
        });
    });
})();
</script>
